<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoPlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>NexoPlay</h1>
        <nav class="top-nav">
            <a href="#">Inicio</a>
            <a href="#">Anime</a>
            <a href="#">eSports</a>
            <a href="#">Directos</a>
        </nav>
    </header>

    <div class="layout">

        <aside>
            <h2>Menú</h2>
            <ul>
                <li>Inicio</li>
                <li>Mi lista</li>
                <li>Torneos</li>
                <li>Estrenos</li>
            </ul>
        </aside>

        <main>
            <h2>En vivo ahora</h2>

            <section class="video-grid">

                <article class="card">
                    <img src="https://picsum.photos/400/250?1" alt="Video">
                    <h3>Valorant Masters</h3>
                    <button>Reproducir</button>
                </article>

                <article class="card">
                    <img src="https://picsum.photos/400/250?2" alt="Video">
                    <h3>Final League of Legends</h3>
                    <button>Reproducir</button>
                </article>

                <article class="card">
                    <img src="https://picsum.photos/400/250?3" alt="Video">
                    <h3>Anime estreno semanal</h3>
                    <button>Reproducir</button>
                </article>

                <article class="card">
                    <img src="https://picsum.photos/400/250?4" alt="Video">
                    <h3>CS2 Championship</h3>
                    <button>Reproducir</button>
                </article>

                <article class="card">
                    <img src="https://picsum.photos/400/250?5" alt="Video">
                    <h3>One Piece Simulcast</h3>
                    <button>Reproducir</button>
                </article>

                <article class="card">
                    <img src="https://picsum.photos/400/250?6" alt="Video">
                    <h3>Street Fighter Finals</h3>
                    <button>Reproducir</button>
                </article>

            </section>
        </main>

    </div>

</body>
</html>
